<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#02020d"/>
    </linearGradient>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00aaff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00aaff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bgGrad)"/>

  <!-- Grid -->
  <g stroke="#0066ff" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/>
  </g>

  <!-- Mac Mini body -->
  <g transform="translate(400, 165)" filter="url(#glow)">
    <!-- Base -->
    <rect x="-90" y="30" width="180" height="12" rx="4" fill="#111" stroke="#0088ff" stroke-width="1" stroke-opacity="0.8"/>
    <!-- Body -->
    <rect x="-80" y="-40" width="160" height="72" rx="8" fill="#0a0a0a" stroke="#0088ff" stroke-width="1.5" stroke-opacity="0.9"/>
    <!-- Screen glow on front -->
    <rect x="-70" y="-30" width="140" height="52" rx="4" fill="url(#screenGlow)"/>
    <!-- Ventilation lines -->
    <line x1="-60" y1="10" x2="-60" y2="25" stroke="#0088ff" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="-50" y1="10" x2="-50" y2="25" stroke="#0088ff" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="-40" y1="10" x2="-40" y2="25" stroke="#0088ff" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="-30" y1="10" x2="-30" y2="25" stroke="#0088ff" stroke-width="1" stroke-opacity="0.4"/>
    <!-- Power LED -->
    <circle cx="60" cy="18" r="3" fill="#00ff88" filter="url(#glow)"/>
    <!-- Apple logo approximation -->
    <text x="0" y="-5" text-anchor="middle" font-size="28" fill="#0088ff" fill-opacity="0.6" font-family="monospace"></text>
  </g>

  <!-- Terminal window left -->
  <g transform="translate(155, 150)">
    <rect x="-110" y="-75" width="220" height="140" rx="6" fill="#050510" stroke="#0088ff" stroke-width="1" stroke-opacity="0.6"/>
    <!-- Title bar -->
    <rect x="-110" y="-75" width="220" height="22" rx="6" fill="#0088ff" fill-opacity="0.15"/>
    <circle cx="-90" cy="-64" r="5" fill="#ff5555" fill-opacity="0.8"/>
    <circle cx="-75" cy="-64" r="5" fill="#ffaa00" fill-opacity="0.8"/>
    <circle cx="-60" cy="-64" r="5" fill="#00ff88" fill-opacity="0.8"/>
    <text x="-15" y="-59" font-family="monospace" font-size="9" fill="#0088ff" fill-opacity="0.6">terminal</text>
    <!-- Code lines -->
    <text x="-98" y="-38" font-family="monospace" font-size="9" fill="#00ff88">$ brew install wireguard</text>
    <text x="-98" y="-22" font-family="monospace" font-size="9" fill="#0088ff" fill-opacity="0.7">$ npm i -g @anthropic-ai/claude-code</text>
    <text x="-98" y="-6" font-family="monospace" font-size="9" fill="#00ff88">$ gh auth login</text>
    <text x="-98" y="10" font-family="monospace" font-size="9" fill="#0088ff" fill-opacity="0.7">$ curl ifconfig.me</text>
    <text x="-98" y="26" font-family="monospace" font-size="9" fill="#00ff88">137.220.56.59 ✓</text>
    <text x="-98" y="45" font-family="monospace" font-size="9" fill="#00ff88" fill-opacity="0.5">█</text>
  </g>

  <!-- Terminal window right -->
  <g transform="translate(645, 150)">
    <rect x="-110" y="-75" width="220" height="140" rx="6" fill="#050510" stroke="#0088ff" stroke-width="1" stroke-opacity="0.6"/>
    <!-- Title bar -->
    <rect x="-110" y="-75" width="220" height="22" rx="6" fill="#0088ff" fill-opacity="0.15"/>
    <circle cx="-90" cy="-64" r="5" fill="#ff5555" fill-opacity="0.8"/>
    <circle cx="-75" cy="-64" r="5" fill="#ffaa00" fill-opacity="0.8"/>
    <circle cx="-60" cy="-64" r="5" fill="#00ff88" fill-opacity="0.8"/>
    <text x="-15" y="-59" font-family="monospace" font-size="9" fill="#0088ff" fill-opacity="0.6">setup.sh</text>
    <!-- Check marks -->
    <text x="-98" y="-38" font-family="monospace" font-size="9" fill="#00ff88">[✓] Xcode CLT installed</text>
    <text x="-98" y="-22" font-family="monospace" font-size="9" fill="#00ff88">[✓] Homebrew installed</text>
    <text x="-98" y="-6" font-family="monospace" font-size="9" fill="#00ff88">[✓] Claude Code ready</text>
    <text x="-98" y="10" font-family="monospace" font-size="9" fill="#00ff88">[✓] Brave + Cursor</text>
    <text x="-98" y="26" font-family="monospace" font-size="9" fill="#00ff88">[✓] GitHub authed</text>
    <text x="-98" y="45" font-family="monospace" font-size="9" fill="#00ff88" fill-opacity="0.5">█</text>
  </g>

  <!-- Connecting lines -->
  <line x1="265" y1="150" x2="320" y2="150" stroke="#0088ff" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,3" filter="url(#glow)"/>
  <line x1="480" y1="150" x2="535" y2="150" stroke="#0088ff" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,3" filter="url(#glow)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#0088ff" filter="url(#strongGlow)">MAC MINI SETUP</text>
  <text x="400" y="57" text-anchor="middle" font-family="monospace" font-size="10" fill="#0088ff" fill-opacity="0.5">one script. full dev environment. zero excuses.</text>

  <!-- Bottom -->
  <text x="400" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#0088ff" fill-opacity="0.3">⚠  question everything. especially the government.</text>
  <text x="12" y="20" font-family="monospace" font-size="9" fill="#0088ff" fill-opacity="0.3">linkvectorized</text>
  <text x="788" y="20" text-anchor="end" font-family="monospace" font-size="9" fill="#0088ff" fill-opacity="0.3">github.com/linkvectorized/mac-mini-setup-claude</text>
</svg>
